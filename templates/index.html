<!DOCTYPE html>
<html>
<head>
    <title>API Security Scanner</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<h1>API Security Scanner</h1>

<form action="/scan" method="POST">
    <label>Enter API Endpoint:</label><br><br>

    <input type="text" name="api_url" placeholder="https://api.example.com" required>

    <br><br>

    <button type="submit">Scan API</button>
</form>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

</body>
</html>
